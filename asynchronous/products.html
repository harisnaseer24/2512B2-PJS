    <script>
let productList = document.getElementById("productList");
let searchInput = document.getElementById("searchInput");
let searchBtn= document.getElementById("searchBtn");
// IIFE - Immediately Invoked Function Expression
// (async function (){})()

(async function(){
let data= await fetch('https://dummyjson.com/products?limit=194')
   let result = await data.json()
   let products = await result.products
     console.log(products)
     products.forEach((prd) => {
        productList.innerHTML += `
        <div class="col-lg-4 my-3">
<div class="card" >
  <img src="${prd.thumbnail}" class="card-img-top" alt="..." height="280">
  <div class="card-body">
    <h5 class="card-title">${prd.title}</h5>
    <p class="card-text">${prd.description}.</p>
    <a href="#" class="btn btn-primary">$ ${prd.price}</a>
  </div>
</div>
</div> `;
     });

function Search(){
productList.innerHTML = "";
  let searchQuery = searchInput.value.toLowerCase();
  let searchResult = products.filter((product) => {
    if (product.title.toLowerCase().includes(searchQuery)  || product.description.toLowerCase().includes(searchQuery) || product.price == searchQuery) {
      return product;
    }
  });
  console.log(searchResult);

  if (searchResult.length > 0) {
    searchResult.forEach((prd) => {
      productList.innerHTML += `
    
       <div class="col-lg-4 my-3">
<div class="card" >
  <img src="${prd.thumbnail}" class="card-img-top" alt="..." height="280">
  <div class="card-body">
    <h5 class="card-title">${prd.title}</h5>
    <p class="card-text">${prd.description}.</p>
    <a href="#" class="btn btn-primary">$ ${prd.price}</a>
  </div>
</div>
</div> 
      `;
    });
  } else {
    productList.innerHTML = `<h1>No movie found😢</h1>`;
  }




}


searchBtn.addEventListener("click",Search)

})()
